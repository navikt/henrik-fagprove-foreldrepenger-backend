apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: fagprove-foreldrepenger-backend
  namespace: laerlinger
  labels:
    team: laerlinger

spec:
  image: {{image}}
  port: 8081

  ingresses:
    - https://fagprove-foreldrepenger-backend.intern.dev.nav.no

  replicas:
    min: 1
    max: 1

  accessPolicy:
    inbound:
      rules:
        - application: fagprove-foreldrepenger-frontend

  liveness:
    path: /actuator/health
    initialDelay: 30
    periodSeconds: 5
    failureThreshold: 30

  readiness:
    path: /actuator/health
    initialDelay: 30
    periodSeconds: 5
    failureThreshold: 30

  resources:
    requests:
      cpu: 50m
      memory: 32Mi